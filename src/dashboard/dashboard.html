<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Plant Pest Diagnosis Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .status {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .status-red    { background: linear-gradient(45deg, #e74c3c, #c0392b); }
        .status-green  { background: linear-gradient(45deg, #2ecc71, #27ae60); }
        .status-stream { background: linear-gradient(45deg, #f39c12, #e67e22); }
        h1 { color: #2c3e50; font-size: 2.5em; text-align: center; margin: 0; }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-box {
            background: linear-gradient(135deg, #f8f9ff, #e8ecff);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }
        .metric-box:hover { transform: translateY(-5px); border-color: #3498db; }
        .metric-value { font-size: 2.2em; font-weight: bold; color: #3498db; margin-bottom: 5px; }
        .metric-label { color: #7f8c8d; font-size: 0.95em; text-transform: uppercase; letter-spacing: 1px; }

        .confidence-bar {
            width: 100%; height: 25px;
            background: #ecf0f1;
            border-radius: 15px;
            overflow: hidden;
            margin: 20px 0;
        }
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            border-radius: 15px;
            transition: width 1s ease;
            position: relative;
        }
        .confidence-fill::after {
            content: attr(data-percent) '%';
            position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%);
            color: white; font-weight: bold; font-size: 14px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 30px;
        }
        .image-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }
        .image-card h3 { color: #2c3e50; margin-bottom: 15px; font-size: 1.3em; }
        .image-card img {
            max-width: 100%; height: 300px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* LIVE badge shown on stream */
        .live-badge {
            display: inline-block;
            background: #e74c3c;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            margin-left: 8px;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        /* Spinner shown while waiting for result after capture */
        .spinner {
            display: none;
            width: 50px; height: 50px;
            border: 5px solid #ecf0f1;
            border-top-color: #3498db;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .capture-btn {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white; border: none;
            padding: 15px 40px; border-radius: 30px;
            font-size: 18px; font-weight: bold;
            cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 25px rgba(231,76,60,0.4);
            transition: all 0.3s ease;
        }
        .capture-btn:hover { transform: translateY(-3px); }
        .capture-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .new-scan-btn {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            color: white; border: none;
            padding: 12px 30px; border-radius: 30px;
            font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 15px;
            box-shadow: 0 8px 20px rgba(46,204,113,0.4);
            transition: all 0.3s ease;
            display: none;   /* hidden until result is shown */
        }
        .new-scan-btn:hover { transform: translateY(-3px); }

        /* Result panel hidden until result arrives */
        #result-panel { display: none; }

        @media (max-width: 768px) {
            .image-grid { grid-template-columns: 1fr; }
            body { padding: 10px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1>🌿 Plant Pest Diagnosis</h1>
        <div id="status" class="status status-stream">
            <span id="status-text">📹 Live Feed</span>
        </div>
    </div>

    <!-- Metrics (shown only after result) -->
    <div id="result-panel">
        <div class="metrics">
            <div class="metric-box">
                <div class="metric-value" id="disease-name">—</div>
                <div class="metric-label">Disease</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="confidence-val">0%</div>
                <div class="metric-label">Confidence</div>
            </div>
            <div class="metric-box">
                <div class="metric-value" id="affected-val">0%</div>
                <div class="metric-label">Affected Area</div>
            </div>
        </div>

        <div class="confidence-bar">
            <div class="confidence-fill" id="confidence-fill" data-percent="0"></div>
        </div>

        <div class="metrics">
            <div class="metric-box">
                <div id="feature-text">—</div>
                <div class="metric-label">Feature Analysis</div>
            </div>
        </div>
    </div>

    <!-- Image area -->
    <div class="image-grid">

        <!-- LEFT: Live stream → switches to captured photo after result -->
        <div class="image-card">
            <h3 id="cam-title">
                📹 Live Camera
                <span class="live-badge" id="live-badge">LIVE</span>
            </h3>

            <!-- Live MJPEG stream proxied through Flask -->
            <img id="stream-img"
                 src="http://localhost:5000/stream"
                 alt="Live Stream"
                 onerror="streamError()">

            <!-- Captured still photo (hidden until result) -->
            <img id="captured-img"
                 src=""
                 alt="Captured Photo"
                 style="display:none;">

            <!-- Spinner shown while waiting for server result -->
            <div class="spinner" id="spinner"></div>

            <!-- Capture button -->
            <button class="capture-btn" id="capture-btn" onclick="triggerCapture()">
                📷 Capture & Analyze
            </button>

            <!-- New Scan button (shown after result) -->
            <button class="new-scan-btn" id="new-scan-btn" onclick="newScan()">
                🔄 New Scan
            </button>
        </div>

        <!-- RIGHT: Diseased area overlay (shown after result) -->
        <div class="image-card" id="affected-card" style="display:none;">
            <h3>🔍 Diseased Areas</h3>
            <img id="affected-img" src="" alt="Affected Overlay">
        </div>

    </div>
</div>

<script>
    // ── PLACEHOLDERS ─────────────────────────────────────────────────
    const ESP32_IP  = '10.22.71.19';        // ← PLACEHOLDER: ESP32 IP from Serial Monitor
    const SERVER_IP = '10.22.71.133';           // ← PLACEHOLDER: PC/RPi running Flask

    // ── State ────────────────────────────────────────────────────────
    let resultPolling = null;   // interval ID for polling server
    let isCapturing   = false;

    // ── Stream error fallback ─────────────────────────────────────────
    function streamError() {
        document.getElementById('stream-img').alt =
            '⚠️ Stream unavailable — check ESP32 IP';
        document.getElementById('live-badge').style.background = '#e74c3c';
        document.getElementById('live-badge').textContent = 'OFFLINE';
    }

    // ── Capture button clicked ────────────────────────────────────────
    function triggerCapture() {
        if (isCapturing) return;
        isCapturing = true;

        const btn = document.getElementById('capture-btn');
        const spinner = document.getElementById('spinner');

        // Disable button, show spinner
        btn.disabled = true;
        btn.textContent = '⏳ Analyzing...';
        spinner.style.display = 'block';

        // Update status badge
        const status = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        status.className = 'status status-stream';
        statusText.innerHTML = '⏳ Capturing...';

        // Send trigger to ESP32 on port 81
        fetch(`http://${ESP32_IP}:81/trigger`)
            .then(() => {
                console.log('✅ Trigger sent to ESP32');
                // Hide live stream, start polling server for result
                document.getElementById('stream-img').style.display = 'none';
                startPollingResult();
            })
            .catch(err => {
                console.error('ESP32 trigger failed:', err);
                alert('❌ Cannot reach ESP32. Check IP: ' + ESP32_IP);
                resetToStream();
            });
    }

    // ── Poll Flask server every 2s until result arrives ───────────────
    function startPollingResult() {
        resultPolling = setInterval(() => {
            fetch(`http://${SERVER_IP}:5000/api/result`)
                .then(r => r.json())
                .then(data => {
                    if (data.disease && data.disease !== 'Waiting...') {
                        clearInterval(resultPolling);
                        showResult(data);
                    }
                })
                .catch(err => console.log('Polling...', err));
        }, 2000);
    }

    // ── Show result after server responds ─────────────────────────────
    function showResult(data) {
        const spinner = document.getElementById('spinner');
        spinner.style.display = 'none';

        // Show captured image
        if (data.imagepath) {
            const capImg = document.getElementById('captured-img');
            capImg.src = `http://${SERVER_IP}:5000${data.imagepath}?t=${Date.now()}`;
            capImg.style.display = 'block';
        }

        // Update title — remove LIVE badge
        document.getElementById('cam-title').innerHTML = '📸 Captured Photo';

        // Show affected overlay
        if (data.affected_image) {
            document.getElementById('affected-img').src =
                `http://${SERVER_IP}:5000${data.affected_image}?t=${Date.now()}`;
            document.getElementById('affected-card').style.display = 'block';
        }

        // Show metrics panel
        document.getElementById('result-panel').style.display = 'block';
        document.getElementById('disease-name').textContent  = data.disease;
        document.getElementById('confidence-val').textContent = data.confidence + '%';
        document.getElementById('affected-val').textContent   = data.affected_area + '%';
        document.getElementById('feature-text').textContent   = data.feature_type;

        // Animate confidence bar
        const fill = document.getElementById('confidence-fill');
        fill.style.width = data.confidence + '%';
        fill.setAttribute('data-percent', data.confidence);

        // Update status badge
        const status = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        if (data.led === 'RED') {
            status.className = 'status status-red';
            statusText.innerHTML = '🚨 Disease Detected';
        } else {
            status.className = 'status status-green';
            statusText.innerHTML = '✅ Healthy';
        }

        // Show New Scan button, hide Capture button
        document.getElementById('capture-btn').style.display = 'none';
        document.getElementById('new-scan-btn').style.display = 'inline-block';

        isCapturing = false;
    }

    // ── New Scan — go back to live stream ─────────────────────────────
    function newScan() {
        // Reset UI to stream mode
        document.getElementById('stream-img').src =
            `http://localhost:5000/stream?t=${Date.now()}`;   // force reload
        document.getElementById('stream-img').style.display = 'block';
        document.getElementById('captured-img').style.display = 'none';
        document.getElementById('captured-img').src = '';

        document.getElementById('cam-title').innerHTML =
            '📹 Live Camera <span class="live-badge" id="live-badge">LIVE</span>';

        document.getElementById('affected-card').style.display  = 'none';
        document.getElementById('result-panel').style.display   = 'none';

        document.getElementById('capture-btn').disabled    = false;
        document.getElementById('capture-btn').textContent = '📷 Capture & Analyze';
        document.getElementById('capture-btn').style.display = 'inline-block';
        document.getElementById('new-scan-btn').style.display  = 'none';

        const status = document.getElementById('status');
        status.className = 'status status-stream';
        document.getElementById('status-text').innerHTML = '📹 Live Feed';
    }

    // ── Reset on error ────────────────────────────────────────────────
    function resetToStream() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('stream-img').style.display = 'block';
        const btn = document.getElementById('capture-btn');
        btn.disabled = false;
        btn.textContent = '📷 Capture & Analyze';
        isCapturing = false;
        document.getElementById('status').className = 'status status-stream';
        document.getElementById('status-text').innerHTML = '📹 Live Feed';
    }
</script>
</body>
</html>
